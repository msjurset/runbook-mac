name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in project
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i '' "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"${VERSION}\"/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: \".*\"/CURRENT_PROJECT_VERSION: \"${VERSION}\"/" project.yml

      - name: Build
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Create app bundle
        run: make bundle

      - name: Create release archive
        run: |
          mkdir -p dist
          ditto -c -k --keepParent Runbook.app dist/Runbook-${{ steps.version.outputs.VERSION }}.zip

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Idempotent: if the release was pre-created (e.g. with custom
        # hand-authored notes via `gh release create <tag> --notes ...`),
        # skip re-creation; otherwise create with auto-generated notes.
        # Either way upload/replace the assets.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256=$(shasum -a 256 dist/Runbook-${VERSION}.zip | cut -d ' ' -f 1)
          git clone https://x-access-token:${TAP_TOKEN}@github.com/msjurset/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Casks/runbook-mac.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/runbook-mac.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/runbook-mac.rb
          git commit -m "runbook-mac ${VERSION}"
          git push
