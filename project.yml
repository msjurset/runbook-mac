name: RunbookMac
options:
  bundleIdPrefix: com.msjurset
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.0.0

targets:
  RunbookMac:
    type: application
    platform: macOS
    sources:
      - Sources/RunbookMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.msjurset.runbook-mac
        PRODUCT_NAME: Runbook
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "1.4.0"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_CFBundleDisplayName: Runbook
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: Yams

  RunbookMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RunbookMac
